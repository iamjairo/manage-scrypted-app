name: "Auto-merge Dependabot (patch/minor only)"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Check context
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull_request in context — exiting.");
              return;
            }
            const prNumber = pr.number;
            core.info(`PR #${prNumber} - title: ${pr.title} author: ${pr.user.login}`);

            // 1) Only act on Dependabot authors
            const allowedAuthors = ["dependabot[bot]", "dependabot"];
            if (!allowedAuthors.includes(pr.user.login)) {
              core.info(`Author ${pr.user.login} is not Dependabot; skipping.`);
              return;
            }

            // 2) Must have 'dependencies' label
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes("dependencies")) {
              core.info("PR missing 'dependencies' label; skipping auto-merge.");
              return;
            }

            // 3) Parse version bump from title or body (best-effort)
            const versionRegex = /(?:from\s+|to\s+)?v?(\d+\.\d+\.\d+)/ig;
            const versions = [];
            for (const text of [pr.title || "", pr.body || ""]) {
              let m;
              while ((m = versionRegex.exec(text))) {
                versions.push(m[1]);
              }
            }
            if (versions.length < 2) {
              core.info("Could not reliably parse two semantic versions from PR title/body; will inspect commits/files before deciding.");
            } else {
              const last = (v) => v.split(".").map(n => parseInt(n, 10));
              const a = last(versions[0]);
              const b = last(versions[1]);
              core.info(`Parsed versions: ${versions[0]} -> ${versions[1]}`);
              if (b[0] > a[0]) {
                core.info("Major version bump detected — will NOT auto-merge.");
                return;
              }
              if (b[1] > a[1]) {
                core.info("Minor version bump detected — eligible for auto-merge (pending checks and native-file rules).");
              } else if (b[2] > a[2]) {
                core.info("Patch version bump detected — eligible for auto-merge (pending checks and native-file rules).");
              } else {
                core.info("No semver increase detected (or same version) — skipping auto-merge.");
                return;
              }
            }

            // 4) Inspect changed files to detect native/Cargo or known native indicators
            const changedFiles = await github.paginate(github.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.info(`Changed files count: ${changedFiles.length}`);

            // Define simple native checks
            const nativePathIndicators = [
              "Cargo.toml",
              "server-app-tauri/",
              "server-app/",
              "Cargo.lock",
            ];
            const nativeKeywords = ["node-gyp", "bindings", "native", "prebuild", "node-addon-api"];
            let touchesNative = false;
            for (const f of changedFiles) {
              const path = f.filename || f.path;
              if (nativePathIndicators.some(p => path.includes(p))) {
                core.info(`Native path indicator matched: ${path}`);
                touchesNative = true;
                break;
              }
            }

            if (!touchesNative) {
              // If package.json changed, fetch its content at head and look for native keywords
              const pkgChanges = changedFiles.filter(f => f.filename.endsWith("package.json"));
              for (const p of pkgChanges) {
                core.info(`package.json changed at: ${p.filename} — inspecting for native build keywords`);
                try {
                  const contentResp = await github.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path: p.filename,
                    ref: pr.head.sha,
                  });
                  const contentBuffer = Buffer.from(contentResp.data.content, contentResp.data.encoding);
                  const pkgText = contentBuffer.toString("utf8");
                  if (nativeKeywords.some(k => pkgText.includes(k))) {
                    core.info(`Native keyword found in ${p.filename} — will NOT auto-merge.`);
                    touchesNative = true;
                    break;
                  }
                } catch (err) {
                  core.info(`Failed to fetch ${p.filename} at head ref: ${err}`);
                  // Conservative approach: treat inability to inspect as potential native -> skip merge
                  touchesNative = true;
                  break;
                }
              }
            }

            if (touchesNative) {
              core.info("PR touches native code or manifests; will NOT auto-merge.");
              return;
            }

            // 5) Wait for required status checks to pass (best-effort polling)
            const ref = pr.head.sha;
            core.info(`Waiting for checks/statuses on ref ${ref} (will poll up to 10 times, 15s interval).`);
            let attempts = 0;
            let combinedState = null;
            while (attempts < 10) {
              attempts++;
              const status = await github.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
              combinedState = status.data.state; // 'success', 'failure', 'pending'
              core.info(`Attempt ${attempts}: combined status = ${combinedState}`);
              if (combinedState === "success") break;
              if (combinedState === "failure") {
                core.info("Status checks failing — will not merge.");
                return;
              }
              await new Promise(res => setTimeout(res, 15000)); // wait 15s
            }
            if (combinedState !== "success") {
              core.info("Status checks did not reach success within timeout — skipping auto-merge.");
              return;
            }

            // Re-check PR mergeable state
            const prDetails = await github.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (!prDetails.data.mergeable) {
              core.info(`PR mergeable state is false (state=${prDetails.data.mergeable_state}) — skipping.`);
              return;
            }
            core.info("All checks green and PR mergeable — merging now.");

            // 6) Merge using a merge commit
            try {
              await github.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: "merge",
                commit_title: `chore: auto-merge Dependabot updates (patch/minor) — PR #${prNumber}`,
                commit_message: `Auto-merged by workflow: patch/minor dependency bump from Dependabot.\n\nPR: ${pr.html_url}`,
              });
              core.info(`Merged PR #${prNumber} successfully.`);
            } catch (err) {
              core.info(`Merge attempt failed: ${err}`);
              // If merge fails due to protections, log and exit with failure to notify maintainers
              throw err;
            }
